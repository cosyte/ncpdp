name: Nightly fuzz

# Amplified never-throw / boundary fuzzing of both standards (NCPDP-10):
#   - Telecom byte tokenizer (framing + field-id soup), and
#   - SCRIPT XML XXE / entity-expansion (the `xml-load.ts` DOCTYPE/ENTITY refusal + processEntities:false).
# The per-commit `ci` job runs the property/fuzz suite at its committed base iteration counts. This
# nightly job runs the same targets at a HIGHER iteration count (`NCPDP_FUZZ_RUNS`) — the deep search
# that would make the per-commit run slow. fast-check derives a fresh seed each run and prints the
# failing seed + counterexample, so any finding is replayable. A failure opens/updates a single sticky
# issue so a regression NOTIFIES instead of scrolling past the Actions log; a clean run auto-closes it.

on:
  schedule:
    # 06:15 UTC daily (offset from x12's 06:00 nightly fuzz so the two don't contend for runners).
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      runs-multiplier:
        description: "NCPDP_FUZZ_RUNS multiplier (base counts × this)"
        required: false
        default: "20"

permissions:
  contents: read
  issues: write

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Amplified fuzz run
        env:
          NCPDP_FUZZ_RUNS: ${{ github.event.inputs.runs-multiplier || '20' }}
        # Only the property/fuzz layer — the amplification knob is scoped to the fuzz targets; no
        # coverage gate here (that is the per-commit `ci` job's job).
        run: pnpm vitest run test/property

  notify-failure:
    needs: fuzz
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_REPO: ${{ github.repository }}
      ISSUE_MARKER: "<!-- cosyte-ncpdp-fuzz-failure-v1 -->"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Open or update the sticky fuzz-failure issue
        run: |
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing="$(gh issue list --state open --search "$ISSUE_MARKER in:body" --json number --jq '.[0].number // ""')"
          body="$ISSUE_MARKER
          The **nightly fuzz** run failed — a hostile Telecom byte stream or an adversarial SCRIPT XML input
          tripped an unsanctioned throw, or the XXE / entity-declaration refusal boundary regressed. Both
          parsers must NEVER throw outside their sanctioned Tier-3 fatals, and every \`<!DOCTYPE>\`/\`<!ENTITY>\`
          declaration MUST be refused with \`NCPDP_SCRIPT_NOT_XML\`.

          - Failing run: $run_url
          - Reproduce: the log prints the fast-check counterexample and seed; re-run locally with
            \`pnpm vitest run test/property\` (add the printed seed to the failing \`fc.assert\` to replay exactly).

          This issue auto-closes on the next green nightly fuzz run."
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "Nightly fuzz failure" --body "$body" --label "fuzz" 2>/dev/null \
              || gh issue create --title "Nightly fuzz failure" --body "$body"
          fi

  close-failure-alert:
    needs: fuzz
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_REPO: ${{ github.repository }}
      ISSUE_MARKER: "<!-- cosyte-ncpdp-fuzz-failure-v1 -->"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Close any open fuzz-failure issue
        run: |
          existing="$(gh issue list --state open --search "$ISSUE_MARKER in:body" --json number --jq '.[0].number // ""')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Nightly fuzz is green again ($GITHUB_RUN_ID) — auto-closing."
            gh issue close "$existing"
          fi
